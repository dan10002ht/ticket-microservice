# gRPC port (default 9090 conflicts with Prometheus)
grpc:
  server:
    port: 50056

# HTTP server port
server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:50433}/${DB_NAME:booking_system}
    username: ${DB_USER:booking_user}
    password: ${DB_PASSWORD:booking_pass}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

payment:
  stripe:
    api-key: ${STRIPE_API_KEY:sk_test_dev_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_dev_placeholder}
    public-key: ${STRIPE_PUBLIC_KEY:pk_test_dev_placeholder}

  paypal:
    mode: sandbox

logging:
  level:
    root: INFO
    com.ticketing.payment: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
