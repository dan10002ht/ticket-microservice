spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:50433}/${DB_NAME:booking_system}
    username: ${DB_USER:booking_user}
    password: ${DB_PASSWORD:booking_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:50092}
    consumer:
      group-id: invoice-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: RECORD
      concurrency: 1

kafka:
  topics:
    payment-events: payment-events

logging:
  level:
    root: INFO
    com.ticketing.invoice: INFO
    org.springframework.web: WARN
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
