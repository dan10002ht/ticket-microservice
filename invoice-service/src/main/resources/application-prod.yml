spring:
  config:
    activate:
      on-profile: prod

  datasource:
    # Production: all DB credentials are required — no defaults.
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

logging:
  level:
    root: WARN
    com.ticketing.invoice: INFO
    org.springframework.web: WARN
    org.springframework.kafka: WARN

management:
  endpoint:
    health:
      show-details: never
