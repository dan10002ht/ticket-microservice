global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:53000"]

  - job_name: "auth-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:53001"]

  - job_name: "event-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9095"]

  - job_name: "ticket-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9096"]

  - job_name: "checkin-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:2112"]

  - job_name: "invoice-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]

  - job_name: "booking-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8084"]

  - job_name: "payment-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8085"]
